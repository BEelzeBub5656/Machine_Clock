<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      text { font-family: Consolas, monospace; font-size: 11px; }
      .title { font-size: 15px; font-weight: bold; fill: #fff; }
      .sub { font-size: 11px; fill: #aaa; }
      .net { font-size: 10px; fill: #4fc3f7; }
      .comp { font-size: 10px; fill: #ffcc80; }
      .pin { font-size: 9px; fill: #aaa; }
      .wire { stroke: #66bb6a; stroke-width: 2; fill: none; }
      .gnd { stroke: #444; stroke-width: 1.5; fill: none; }
      .bold { stroke: #ff8a65; stroke-width: 3; fill: none; }
    </style>
  </defs>
  <rect width="800" height="420" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" class="title">STM32 Mechanical Clock - Power Board v2.0</text>
  <text x="400" y="40" text-anchor="middle" class="sub">LRS 5V Input &amp;rarr; LC Filter &amp;rarr; AMS1117 Module &amp;rarr; 3 Output Rails</text>

  <!-- Main power rail: 5V_RAW -->
  <line x1="60" y1="80" x2="730" y2="80" class="wire"/>
  <text x="270" y="74" class="net">5V_RAW (inductor/before)</text>

  <!-- J1: 5V_IN -->
  <rect x="60" y="65" width="50" height="30" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2"/>
  <text x="85" y="84" text-anchor="middle" class="comp">5V_IN</text>
  <text x="85" y="110" text-anchor="middle" class="pin">J1 (焊盘)</text>

  <!-- J4: 5V_LOGIC -->
  <line x1="110" y1="80" x2="110" y2="160" class="wire"/>
  <rect x="85" y="160" width="50" height="30" rx="3" fill="#263238" stroke="#81c784" stroke-width="2"/>
  <text x="110" y="179" text-anchor="middle" class="comp">5V_LOGIC</text>
  <text x="110" y="205" text-anchor="middle" class="pin">J4 (ASRPRO+PCA9685逻辑)</text>
  <text x="155" y="195" class="sub">电感前取电，不受舵机浪涌干扰</text>

  <!-- Inductor L1 -->
  <line x1="110" y1="80" x2="170" y2="80" class="bold"/>
  <text x="110" y="75" class="net">→ 分叉点 ①</text>
  <ellipse cx="185" cy="80" rx="15" ry="12" fill="none" stroke="#ff8a65" stroke-width="2"/>
  <text x="185" y="84" text-anchor="middle" class="comp">10uH</text>
  <text x="185" y="110" text-anchor="middle" class="pin">L1 (3A工字电感)</text>

  <!-- C2: 100uF -->
  <line x1="200" y1="80" x2="200" y2="140" class="wire"/>
  <rect x="185" y="140" width="30" height="25" rx="2" fill="#263238" stroke="#81c784" stroke-width="1.5"/>
  <text x="200" y="157" text-anchor="middle" class="comp">100uF</text>
  <text x="200" y="180" text-anchor="middle" class="pin">C2 (AMS1117输入去耦)</text>
  <line x1="200" y1="165" x2="200" y2="195" class="gnd"/>

  <!-- C4: 0.1uF -->
  <rect x="230" y="140" width="30" height="16" rx="2" fill="#263238" stroke="#81c784" stroke-width="1"/>
  <text x="245" y="152" text-anchor="middle" class="comp">0.1uF</text>
  <text x="245" y="170" text-anchor="middle" class="pin">C4</text>

  <!-- 5V_FILT rail -->
  <line x1="200" y1="80" x2="730" y2="80" class="wire" stroke="#ff8a65"/>
  <text x="270" y="74" class="net">→ 分叉点 ② 5V_FILT (LC滤波后)</text>

  <!-- C1: 470uF on 5V_FILT -->
  <line x1="200" y1="80" x2="200" y2="240" class="wire" stroke="#ff8a65"/>
  <rect x="175" y="240" width="50" height="30" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2"/>
  <text x="200" y="259" text-anchor="middle" class="comp">470uF/16V</text>
  <text x="200" y="285" text-anchor="middle" class="pin">C1 (舵机瞬态储能)</text>
  <line x1="200" y1="270" x2="200" y2="310" class="gnd"/>

  <!-- J2: 5V_SERVO -->
  <rect x="380" y="65" width="60" height="30" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2"/>
  <text x="410" y="84" text-anchor="middle" class="comp">5V_SERVO</text>
  <text x="410" y="110" text-anchor="middle" class="pin">J2 (PCA9685舵机轨)</text>
  <line x1="410" y1="80" x2="410" y2="95" class="bold"/>

  <!-- U1: AMS1117 Module -->
  <line x1="200" y1="80" x2="500" y2="160" class="wire"/>
  <rect x="490" y="140" width="100" height="55" rx="5" fill="#1b3a4b" stroke="#4fc3f7" stroke-width="2"/>
  <text x="540" y="160" text-anchor="middle" class="comp">AMS1117-3.3V</text>
  <text x="540" y="175" text-anchor="middle" class="comp">Module</text>
  <text x="540" y="195" text-anchor="middle" class="pin">IN | GND | OUT</text>
  <text x="540" y="210" text-anchor="middle" class="pin">U1 (3脚排母插座)</text>
  <!-- Pin labels -->
  <text x="485" y="155" text-anchor="end" class="pin">5V_RAW →</text>
  <text x="605" y="155" class="pin">→ 3.3V</text>

  <!-- 3.3V rail -->
  <line x1="600" y1="170" x2="730" y2="170" class="wire" stroke="#4fc3f7"/>
  <text x="670" y="165" class="net">3.3V</text>

  <!-- C3: 10uF on 3.3V -->
  <line x1="600" y1="170" x2="600" y2="260" class="wire" stroke="#4fc3f7"/>
  <rect x="580" y="260" width="40" height="25" rx="2" fill="#263238" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="600" y="277" text-anchor="middle" class="comp">10uF</text>
  <text x="600" y="300" text-anchor="middle" class="pin">C3 (LDO输出)</text>
  <line x1="600" y1="285" x2="600" y2="320" class="gnd"/>

  <!-- C5: 0.1uF on 3.3V -->
  <rect x="635" y="260" width="30" height="16" rx="2" fill="#263238" stroke="#4fc3f7" stroke-width="1"/>
  <text x="650" y="272" text-anchor="middle" class="comp">0.1uF</text>
  <text x="650" y="295" text-anchor="middle" class="pin">C5</text>

  <!-- J3: 3.3V output -->
  <rect x="700" y="155" width="50" height="30" rx="3" fill="#263238" stroke="#4fc3f7" stroke-width="2"/>
  <text x="725" y="174" text-anchor="middle" class="comp">3.3V</text>
  <text x="725" y="200" text-anchor="middle" class="pin">J3 (STM32 VDD)</text>

  <!-- GND bus -->
  <line x1="50" y1="360" x2="750" y2="360" class="gnd"/>
  <text x="400" y="355" fill="#666" font-size="9px" text-anchor="middle">GND ─────── 星型一点接地 ─────── 底层整面覆铜</text>
  <text x="400" y="380" fill="#555" font-size="8px" text-anchor="middle">J1-GND · J2-GND · J3-GND · J4-GND · C1-GND · C2-GND · C3-GND · C4-GND · C5-GND · U1-GND</text>

  <!-- Output summary table -->
  <rect x="50" y="120" width="220" height="38" rx="3" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="70" y="136" class="sub">三路输出</text>
  <text x="60" y="152" class="net">5V_SERVO (LC滤波) → PCA9685舵机轨 (3A峰值)</text>
</svg>
