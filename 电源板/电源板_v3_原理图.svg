<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460">
  <defs>
    <style>
      text { font-family: Consolas, monospace; font-size: 11px; }
      .title { font-size: 16px; font-weight: bold; fill: #fff; }
      .sub { font-size: 11px; fill: #aaa; }
      .net { font-size: 10px; fill: #4fc3f7; }
      .comp { font-size: 10px; fill: #ffcc80; }
      .pin { font-size: 9px; fill: #aaa; }
      .wire { stroke: #66bb6a; stroke-width: 2; fill: none; }
      .wire-servo { stroke: #ff8a65; stroke-width: 4; fill: none; }
      .wire-3v3 { stroke: #4fc3f7; stroke-width: 2; fill: none; }
      .gnd { stroke: #555; stroke-width: 1.5; fill: none; }
      .bold { stroke: #ff8a65; stroke-width: 3; fill: none; }
    </style>
  </defs>
  <rect width="900" height="460" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle" class="title">STM32 Mechanical Clock - Power Board v3.0 (30x SG90 / 10A)</text>
  <text x="450" y="42" text-anchor="middle" class="sub">LRS-50-5 5V/10A Input -> LC Filter (10uH/10A + 470uF) -> 5V_SERVO + 5V_LOGIC + 3.3V (AMS1117)</text>

  <!-- Main 5V_RAW bus (pre-inductor) -->
  <line x1="60" y1="80" x2="830" y2="80" class="wire"/>
  <text x="260" y="72" class="net">5V_RAW (10A max, pre-inductor)</text>

  <!-- J1: 5V_IN -->
  <rect x="60" y="62" width="60" height="36" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2"/>
  <text x="90" y="82" text-anchor="middle" class="comp">5V_IN 10A</text>
  <text x="90" y="110" text-anchor="middle" class="pin">J1 KF128 (LRS +V/-V)</text>

  <!-- J4: 5V_LOGIC (tap before inductor) -->
  <line x1="120" y1="80" x2="120" y2="170" class="wire"/>
  <rect x="85" y="170" width="70" height="28" rx="3" fill="#263238" stroke="#81c784" stroke-width="1.5"/>
  <text x="120" y="188" text-anchor="middle" class="comp">5V_LOGIC</text>
  <text x="120" y="210" text-anchor="middle" class="pin">J4 (ASRPRO+PCA9685 VCC)</text>
  <text x="170" y="198" class="sub">电感前, 不受舵机干扰</text>

  <!-- Branch point marker -->
  <circle cx="145" cy="80" r="4" fill="#ff8a65"/>
  <text x="130" y="75" class="net">-> split</text>

  <!-- L1: 10uH/10A -->
  <line x1="145" y1="80" x2="210" y2="80" class="wire-servo"/>
  <ellipse cx="230" cy="80" rx="20" ry="14" fill="none" stroke="#ff8a65" stroke-width="2.5"/>
  <text x="230" y="84" text-anchor="middle" class="comp" fill="#ff8a65" font-weight="bold">10uH/10A</text>
  <text x="230" y="112" text-anchor="middle" class="pin">L1 (环形电感 16mm)</text>

  <!-- 5V_FILT bus (post LC filter) -->
  <line x1="250" y1="80" x2="830" y2="80" class="wire-servo"/>
  <text x="460" y="72" class="net" fill="#ff8a65">5V_FILT (LC滤波后, 10A max) -> post-filter</text>

  <!-- C1: 470uF on 5V_FILT -->
  <line x1="250" y1="80" x2="250" y2="250" class="wire-servo"/>
  <rect x="220" y="250" width="60" height="32" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2"/>
  <text x="250" y="270" text-anchor="middle" class="comp">470uF/16V</text>
  <text x="250" y="296" text-anchor="middle" class="pin">C1 (舵机瞬态储能)</text>
  <line x1="250" y1="282" x2="250" y2="320" class="gnd"/>

  <!-- J2: 5V_SERVO -->
  <rect x="420" y="62" width="70" height="36" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="2.5"/>
  <text x="455" y="82" text-anchor="middle" class="comp">5V_SERVO 10A</text>
  <text x="455" y="112" text-anchor="middle" class="pin">J2 KF128 (PCA9685x2舵机轨)</text>

  <!-- J5: 5V_SPARE -->
  <rect x="620" y="62" width="60" height="36" rx="3" fill="#263238" stroke="#ff8a65" stroke-width="1.5"/>
  <text x="650" y="82" text-anchor="middle" class="comp">5V_SPARE</text>
  <text x="650" y="112" text-anchor="middle" class="pin">J5 (备用5V)</text>

  <!-- AMS1117 section -->
  <line x1="145" y1="80" x2="145" y2="140" class="wire"/>
  <line x1="145" y1="140" x2="560" y2="140" class="wire"/>
  <line x1="560" y1="140" x2="560" y2="170" class="wire"/>

  <!-- C2: 100uF -->
  <line x1="200" y1="140" x2="200" y2="250" class="wire"/>
  <rect x="185" y="250" width="30" height="24" rx="2" fill="#263238" stroke="#81c784" stroke-width="1.5"/>
  <text x="200" y="266" text-anchor="middle" class="comp">100uF</text>
  <text x="200" y="290" text-anchor="middle" class="pin">C2 (LDO输入)</text>
  <line x1="200" y1="274" x2="200" y2="320" class="gnd"/>

  <!-- C4: 0.1uF -->
  <rect x="235" y="250" width="28" height="14" rx="2" fill="#263238" stroke="#81c784" stroke-width="1"/>
  <text x="249" y="262" text-anchor="middle" class="comp" font-size="8">0.1uF</text>
  <text x="249" y="280" text-anchor="middle" class="pin" font-size="8">C4</text>

  <!-- U1: AMS1117 -->
  <rect x="530" y="172" width="100" height="56" rx="4" fill="#1b3a4b" stroke="#4fc3f7" stroke-width="2"/>
  <text x="580" y="192" text-anchor="middle" class="comp">AMS1117-3.3V</text>
  <text x="580" y="206" text-anchor="middle" class="comp" font-size="9">Module</text>
  <text x="580" y="224" text-anchor="middle" class="pin">IN | GND | OUT</text>
  <text x="520" y="196" text-anchor="end" class="pin">5V_RAW -></text>
  <text x="640" y="196" class="pin">-> 3.3V</text>

  <!-- 3.3V rail -->
  <line x1="630" y1="196" x2="830" y2="196" class="wire-3v3"/>
  <text x="700" y="188" class="net" fill="#4fc3f7">3.3V (~100mA)</text>

  <!-- C5: 0.1uF -->
  <rect x="635" y="250" width="28" height="14" rx="2" fill="#263238" stroke="#4fc3f7" stroke-width="1"/>
  <text x="649" y="262" text-anchor="middle" class="comp" font-size="8">0.1uF</text>
  <text x="649" y="280" text-anchor="middle" class="pin" font-size="8">C5</text>

  <!-- C3: 10uF -->
  <line x1="660" y1="196" x2="660" y2="250" class="wire-3v3"/>
  <rect x="645" y="250" width="30" height="24" rx="2" fill="#263238" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="660" y="266" text-anchor="middle" class="comp">10uF</text>
  <text x="660" y="290" text-anchor="middle" class="pin">C3 (LDO输出)</text>
  <line x1="660" y1="274" x2="660" y2="320" class="gnd"/>

  <!-- J3: 3.3V -->
  <rect x="710" y="180" width="50" height="32" rx="3" fill="#263238" stroke="#4fc3f7" stroke-width="2"/>
  <text x="735" y="200" text-anchor="middle" class="comp">3.3V</text>
  <text x="735" y="225" text-anchor="middle" class="pin">J3 (STM32)</text>

  <!-- J6: 3.3V_SPARE -->
  <rect x="780" y="180" width="50" height="32" rx="3" fill="#263238" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="805" y="200" text-anchor="middle" class="comp">3.3V</text>
  <text x="805" y="225" text-anchor="middle" class="pin">J6 (备用)</text>

  <!-- GND bus -->
  <line x1="50" y1="380" x2="850" y2="380" class="gnd"/>
  <text x="450" y="372" fill="#666" font-size="9px" text-anchor="middle">GND --- Star Ground (One-Point) --- Bottom Layer Full Copper Pour (2oz)</text>
  <text x="450" y="404" fill="#555" font-size="8px" text-anchor="middle">J1-GND · J2-GND · J3-GND · J4-GND · J5-GND · J6-GND · C1-GND · C2-GND · C3-GND · C4-GND · C5-GND · U1-GND</text>

  <!-- Current rating annotations -->
  <rect x="55" y="330" width="260" height="42" rx="3" fill="none" stroke="#ff8a65" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="65" y="348" class="sub" fill="#ff8a65">Servo Rail (5V_FILT): 10A max</text>
  <text x="65" y="364" class="pin">Trace: 5mm width @ 2oz Cu -> >=12A capacity</text>

  <rect x="340" y="330" width="260" height="42" rx="3" fill="none" stroke="#81c784" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="350" y="348" class="sub" fill="#81c784">Logic Rail (5V_RAW): <1A</text>
  <text x="350" y="364" class="pin">Trace: 1mm -> ASRPRO 5V + PCA9685 VCC logic</text>

  <rect x="620" y="330" width="220" height="42" rx="3" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="630" y="348" class="sub" fill="#4fc3f7">3.3V Rail: <200mA</text>
  <text x="630" y="364" class="pin">Trace: 0.6mm -> STM32 + Spare</text>

  <!-- Output summary -->
  <text x="450" y="438" fill="#fff" font-size="10px" text-anchor="middle">Outputs: 3x 5V (J2 screw + J4/J5 header) · 2x 3.3V (J3/J6 header) · 4x GND · PCB: 65x50mm 2oz 2-layer</text>
</svg>
